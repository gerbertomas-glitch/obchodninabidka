    let __netRAF = null, __netHandlers = null, __startNetAfterRender = false;
    function stopWelcomeNet() {
        __startNetAfterRender = false;
        if (__netRAF) { cancelAnimationFrame(__netRAF); __netRAF = null; }
        const cv = document.getElementById('welcome-net'); if (cv) cv.style.display = 'none';
        if (__netHandlers) { window.removeEventListener('resize', __netHandlers.resize); window.removeEventListener('mousemove', __netHandlers.move); __netHandlers = null; }
    }
    function startWelcomeNet() {
        const canvas = $('#welcome-net');
        if (!canvas) return;
        stopWelcomeNet();
        canvas.style.display = 'block';
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const ctx = canvas.getContext('2d');
        let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
        const mouse = { x: -9999, y: -9999 };
        let nodes = [];
        const BRAND = '22,163,74';
        function resize() {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const count = Math.max(40, Math.min(90, Math.round(W * H / 20000)));
            nodes = Array.from({ length: count }, () => ({
                x: Math.random() * W, y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.35, vy: (Math.random() - 0.5) * 0.35,
                r: 1.8 + Math.random() * 2.0
            }));
        }
        function frame() {
            ctx.clearRect(0, 0, W, H);
            const LINK = 130, MOUSE_R = 170;
            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                if (!reduce) { n.x += n.vx; n.y += n.vy; }
                if (n.x < 0 || n.x > W) n.vx *= -1;
                if (n.y < 0 || n.y > H) n.vy *= -1;
                n.x = Math.max(0, Math.min(W, n.x)); n.y = Math.max(0, Math.min(H, n.y));
                // přitažení k myši
                const dmx = n.x - mouse.x, dmy = n.y - mouse.y, dm = Math.hypot(dmx, dmy);
                if (dm < MOUSE_R && dm > 0.1) { const f = (1 - dm / MOUSE_R) * 0.6; n.x += (dmx / dm) * f; n.y += (dmy / dm) * f; }
            }
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j], d = Math.hypot(a.x - b.x, a.y - b.y);
                    if (d < LINK) {
                        ctx.strokeStyle = 'rgba(' + BRAND + ',' + (0.30 * (1 - d / LINK)).toFixed(3) + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
                    }
                }
                // spoj s myší
                const a = nodes[i], dm = Math.hypot(a.x - mouse.x, a.y - mouse.y);
                if (dm < MOUSE_R) {
                    ctx.strokeStyle = 'rgba(' + BRAND + ',' + (0.45 * (1 - dm / MOUSE_R)).toFixed(3) + ')';
                    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
                }
            }
            for (const n of nodes) {
                ctx.fillStyle = 'rgba(' + BRAND + ',0.75)';
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
            }
            __netRAF = requestAnimationFrame(frame);
        }
        const move = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.addEventListener('mousemove', move);
        window.addEventListener('resize', resize);
        __netHandlers = { resize, move };
        resize();
        frame();
    }

    // ---------- Score ----------
    function calculateScore(company, state, withBreakdown = false) {
        let score = 0, max = 0;
        const breakdown = [];
        const subs = { basic:{g:0,m:0}, info:{g:0,m:0}, content:{g:0,m:0}, reputation:{g:0,m:0}, engagement:{g:0,m:0} };
        const add = (sub, pts, cond, label) => {
            max += pts; subs[sub].m += pts;
            if (cond) { score += pts; subs[sub].g += pts; if (withBreakdown) breakdown.push({ text: label, earned: true }); }
            else if (withBreakdown) breakdown.push({ text: label, earned: false });
        };
        add('basic', 15, state['check-claimed'], t('c_claimed'));
        [['check-primary','c_primary'],['check-secondary','c_secondary'],['check-address','c_address'],['check-website','c_website'],['check-phone','c_phone'],['check-hours','c_hours'],['check-namespam','c_namespam'],['check-nap','c_nap']]
            .forEach(([id,k]) => add('info', 5, state[id], t(k)));
        [['check-ownerphotos','c_ownerphotos'],['check-photos10','c_photos10'],['check-streetview','c_streetview'],['check-vtour','c_vtour'],['check-drone','c_drone'],['check-video','c_video'],['check-desc','c_desc'],['check-attrs','c_attrs']]
            .forEach(([id,k]) => add('content', 5, state[id], t(k)));
        add('reputation', 10, company.rating >= 4.0, t('s_rating40'));
        add('reputation', 10, company.user_ratings_total >= 20, t('s_reviews20'));
        max += 10; subs.reputation.m += 10;
        const rr = parseInt(state['review-reply-btn'] || '0');
        if (rr === 2) { score += 10; subs.reputation.g += 10; if (withBreakdown) breakdown.push({text:t('s_replyFull'), earned:true}); }
        else if (rr === 1) { score += 5; subs.reputation.g += 5; if (withBreakdown) breakdown.push({text:t('s_replyPart'), earned:true}); }
        else if (withBreakdown) breakdown.push({text:t('s_replyNone'), earned:false});
        add('engagement', 5, state['check-products'], t('c_products'));
        add('engagement', 5, state['check-services'], t('c_services'));
        add('engagement', 10, state['check-posts'], t('c_posts'));
        add('engagement', 5, state['check-posts14'], t('c_posts14'));
        add('engagement', 5, state['check-qa'], t('c_qa'));
        add('engagement', 5, state['check-messaging'], t('c_messaging'));
        add('engagement', 5, state['check-whatsapp'], t('c_whatsapp'));
        return { score: max > 0 ? Math.round((score/max)*100) : 0, breakdown, subs };
    }

        const days = Math.max(0, Math.floor((Date.now()/1000 - newest) / 86400));
        const ago = days < 60 ? tf('agoD', {n: days}) : tf('agoM', {n: Math.floor(days/30)});
        const warn = days > 180;

    // ---------- Inteligence recenzí ----------
    const RI_STOP = new Set(['jsme','byla','bylo','byli','velmi','také','taky','které','který','která','tady','jako','protože','opravdu','this','that','with','have','were','very','from','they','there','their','would','sme','bola','bolo','boli','ktoré','ktorý','vagy','nagyon','volt','hogy','mert','nekem']);
    function renderReviewIntel(d) {
        const w = $('#review-intel-widget'); if (!w) return;
        const revs = (d.reviews || []).filter(r => r.rating);
        if (revs.length < 2) { w.innerHTML = ''; w.classList.add('hidden'); return; }
        w.classList.remove('hidden');
        const recentAvg = revs.reduce((a, r) => a + r.rating, 0) / revs.length;
        const overall = d.rating || recentAvg;
        const delta = recentAvg - overall;
        const trendKey = delta <= -0.2 ? 'ri_trendDown' : (delta >= 0.2 ? 'ri_trendUp' : 'ri_trendFlat');
        const trendColor = delta <= -0.2 ? '#dc2626' : (delta >= 0.2 ? '#16a34a' : '#6b7280');
        const trendIcon = delta <= -0.2 ? 'fa-arrow-trend-down' : (delta >= 0.2 ? 'fa-arrow-trend-up' : 'fa-arrows-left-right');
        let velocity = null;
        const times = revs.map(r => r.time).filter(Boolean).sort((a, b) => a - b);
        if (times.length >= 3) {
            const spanD = (times[times.length - 1] - times[0]) / 86400;
            if (spanD > 7) velocity = ((times.length - 1) / spanD * 30).toFixed(1);
        }
        let owner = null;
        if (d.photos && d.photos.length) {
            const nameWord = (d.name || '').split(/\s+/).find(x => x.replace(/[^\wÀ-ž]/g, '').length >= 3);
            if (nameWord) {
                const nw = nameWord.toLowerCase();
                const cnt = d.photos.filter(p => p.html_attributions && p.html_attributions[0] && String(p.html_attributions[0]).toLowerCase().includes(nw)).length;
                owner = { a: cnt, b: d.photos.length };
            }
        }
        const freq = {};
        revs.forEach(r => String(r.text || '').toLowerCase().split(/[^a-zá-žä-űö-ü]+/i).forEach(word => {
            if (word.length >= 4 && !RI_STOP.has(word)) freq[word] = (freq[word] || 0) + 1;
        }));
        const words = Object.entries(freq).filter(([, n]) => n >= 2).sort((a, b) => b[1] - a[1]).slice(0, 6);
        const tile = (label, valHtml, color, sub) => `<div class="card-minimal !shadow-none px-4 py-3 text-center"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">${label}</p><p class="text-xl font-extrabold mt-0.5" ${color ? `style="color:${color}"` : ''}>${valHtml}</p>${sub ? `<p class="text-[10px] text-gray-400 mt-0.5">${sub}</p>` : ''}</div>`;
        w.innerHTML = `${widgetHeader('fa-comments', t('ri_title'), t('ri_sub'))}
            <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-3">
                ${tile(t('ri_total'), fmtNum(d.user_ratings_total || revs.length), '#111827')}
                ${tile(tf('ri_recent', {n: revs.length}), recentAvg.toFixed(1) + ' ★', scoreColor(recentAvg / 5 * 100))}
                ${tile(t('ri_overall'), overall.toFixed(1) + ' ★', scoreColor(overall / 5 * 100))}
                ${velocity !== null ? tile(t('ri_velocity'), tf('ri_perMonth', {n: velocity})) : ''}
                ${owner ? tile(t('ri_ownerPhotos'), owner.a + ' / ' + owner.b, owner.a === 0 ? '#dc2626' : null, t('ri_ownerNote')) : ''}
            </div>
            <p class="mt-4 text-sm font-semibold" style="color:${trendColor}"><i class="fa-solid ${trendIcon} mr-1.5"></i>${t(trendKey)}</p>
            ${words.length ? `<p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mt-4 mb-2">${t('ri_words')}</p>
            <div class="flex flex-wrap gap-1.5">${words.map(([wd, n]) => `<span class="px-2 py-1 rounded-md bg-gray-50 border border-gray-100 text-gray-600 text-[11px] font-medium">${esc(wd)} ×${n}</span>`).join('')}</div>` : ''}`;
    }

    async function psRun() {
        const d = currentPlaceDetails;
        if (!d || !d.website || psState.running) return;
        psState.running = true; psState.err = false; psState.errMsg = '';
        renderPageSpeed(d);
        const base = 'https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=' + encodeURIComponent(String(d.website).trim()) + '&strategy=mobile&category=PERFORMANCE&category=SEO';
        const attempt = async (url) => {
            const opts = (window.AbortSignal && AbortSignal.timeout) ? { signal: AbortSignal.timeout(90000) } : {};
            const r = await fetch(url, opts);
            let j = null;
            try { j = await r.json(); } catch (e) {}
            if (!r.ok) throw new Error((j && j.error && j.error.message) ? j.error.message : ('HTTP ' + r.status));
            if (j && j.error) throw new Error(j.error.message || 'API error');
            const lr = (j && j.lighthouseResult) || {};
            if (lr.runtimeError && lr.runtimeError.code && lr.runtimeError.code !== 'NO_ERROR') throw new Error(lr.runtimeError.message || lr.runtimeError.code);
            return j;
        };
        const withKey = base + '&key=' + EFFECTIVE_API_KEY;
        try {
            let j;
            try { j = await attempt(withKey); }          // primárně s klíčem (vysoká kvóta)
            catch (e1) {
                try { j = await attempt(base); }         // fallback bez klíče
                catch (e2) {
                    await new Promise(r => setTimeout(r, 3000));
                    try { j = await attempt(withKey); }  // poslední pokus opět s klíčem
                    catch (e3) { throw e1; }              // nahoru pošleme chybu s klíčem (nejrelevantnější)
                }
            }
            const lr = j.lighthouseResult || {};
            psState.data = {
                perf: Math.round(((lr.categories && lr.categories.performance && lr.categories.performance.score) || 0) * 100),
                seo: Math.round(((lr.categories && lr.categories.seo && lr.categories.seo.score) || 0) * 100),
                lcp: (lr.audits && lr.audits['largest-contentful-paint'] && lr.audits['largest-contentful-paint'].displayValue) || '–',
                https: String(lr.finalUrl || d.website).startsWith('https')
            };
            psState.loaded = true;
        } catch (e) {
            console.warn('PageSpeed:', e);
            psState.err = true;
            const msg = String(e && e.message || e);
            psState.errMsg = msg.slice(0, 180);
            psState.errKind = /quota|Queries per day|rateLimit/i.test(msg) ? 'quota'
                : (/referer|referrer|API_KEY|not valid|blocked/i.test(msg) ? 'referrer'
                : (/has not been used|disabled|SERVICE_DISABLED|is not enabled/i.test(msg) ? 'disabled' : 'generic'));
        }
        psState.running = false;
        if (currentView === 'audit' && currentPlaceDetails) renderPageSpeed(currentPlaceDetails);
    }

    const rankColor = (r) => r === null ? '#9ca3af' : (r <= 3 ? '#16a34a' : (r <= 10 ? '#f59e0b' : '#dc2626'));

        const lat = center.lat(), lng = center.lng();
        const dLat = radiusKm / 111.32, dLng = radiusKm / (111.32 * Math.cos(lat * Math.PI / 180));
        const pts = [], half = (size - 1) / 2;
        for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
            pts.push({ lat: lat + (half - r) * (dLat / half || 0), lng: lng + (c - half) * (dLng / half || 0) });
        }
        return pts;
    }

    function ggSearchRank(point, radiusM, keyword, targetId) {
        return new Promise(resolve => {
            const doSearch = (attempt) => {
                placesService.nearbySearch({ location: new google.maps.LatLng(point.lat, point.lng), radius: String(radiusM), keyword }, (results, status) => {
                    if (status === google.maps.places.PlacesServiceStatus.OK && results) {
                        const idx = results.findIndex(r => r.place_id === targetId);
                        resolve({ rank: idx >= 0 ? idx + 1 : null, top3: results.slice(0, 3).map(r => ({ id: r.place_id, name: r.name || '' })) });
                    } else if (String(status) === 'OVER_QUERY_LIMIT' && attempt < 2) {
                        setTimeout(() => doSearch(attempt + 1), 1400);
                    } else resolve({ rank: null, top3: [] });
                });
            };
            doSearch(0);
        });
    }
    async function runGeogrid(d) {
        if (geogridState.running || !placesService) return;
        const kw = ($('#gg-kw').value || '').trim();

        geogridState.running = true;
        const btn = $('#gg-run'); btn.disabled = true;

        const searchRadius = Math.max(800, Math.round(radiusKm * 1000 * 0.9));

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> ' + tf('gg_running', { done: i + 1, total: pts.length });

    function lastReviewAgeDays(d) {

        const res = geogridState.results;
        const eff = res.map(p => p.rank === null ? 21 : p.rank);

        const vis = Math.round(res.reduce((a,p) => a + ggCtr(p.rank), 0) / (res.length * GG_CTR[0]) * 100);
        const potential = Math.round((GG_CTR[0] + GG_CTR[1] + GG_CTR[2]) / 3 / GG_CTR[0] * 100);

    function serializePlace(d) {
        if (!d) return null;
        const o = {};
        ['place_id','name','formatted_address','rating','user_ratings_total','types','website','formatted_phone_number','business_status','price_level','wheelchair_accessible_entrance','distance'].forEach(k => { if (d[k] !== undefined) o[k] = d[k]; });
        ATTR_KEYS.forEach(k => { if (d[k] !== undefined) o[k] = d[k]; });
        if (d.editorial_summary) o.editorial_summary = { overview: d.editorial_summary.overview };
        if (d.plus_code) o.plus_code = { global_code: d.plus_code.global_code };
        if (d.opening_hours && d.opening_hours.weekday_text) o.opening_hours = { weekday_text: d.opening_hours.weekday_text };
        if (d.geometry && d.geometry.location) o.geo = { lat: d.geometry.location.lat(), lng: d.geometry.location.lng() };
        if (d.photos && d.photos.length) { try { o.photoUrl = d.photos[0].getUrl({ maxWidth: 640, maxHeight: 400 }); } catch (e) {} o.photoCount = d.photos.length; }
        if (d.reviews) o.reviews = d.reviews.map(r => ({ author_name: r.author_name, rating: r.rating, text: r.text, time: r.time }));
        if (d._plus) o._plus = d._plus;
        return o;
    }
    function revivePlace(o) {
        if (!o) return null;
        const d = { ...o };
        if (o.geo) d.geometry = { location: { lat: () => o.geo.lat, lng: () => o.geo.lng } };
        if (o.photoCount) { d.photos = Array.from({ length: o.photoCount }, (_, i) => ({ getUrl: () => (i === 0 && o.photoUrl) ? o.photoUrl : 'https://placehold.co/640x400/f3f4f6/9ca3af?text=%20' })); }
        return d;
    }

                currentPlaceDetails = revivePlace(data.place);

                manualTouched = !!data.manualTouched;

                if (data.pricing) { pricingState.sel = data.pricing.sel || {}; pricingState.termMain = data.pricing.termMain || 'yearly'; pricingState.termManage = data.pricing.termManage || 'yearly'; }
                selectedRefs = data.selectedRefs || [];

    const ITEM_INDEX = {};
    PRICING.packages.forEach(d => ITEM_INDEX[d.id] = { kind:'package', def:d, group:'package' });
    PRICING.gmfManage.forEach(d => ITEM_INDEX[d.id] = { kind:'manage', def:d, group:'manage' });
    PRICING.gsv.forEach(d => ITEM_INDEX[d.id] = { kind:'gsv', def:d, group:'gsv' });
    PRICING.gsvAir.forEach(d => ITEM_INDEX[d.id] = { kind:'gsvair', def:d, group:'gsvair' });
    PRICING.gmfOnetime.forEach(d => ITEM_INDEX[d.id] = { kind:'onetime', def:d, group: d.id.startsWith('gmf_optimize') ? 'optimize' : null });
    PRICING.extras.forEach(d => ITEM_INDEX[d.id] = { kind:'extra', def:d, group:'extra' });
    PRICING.nfc.forEach(d => ITEM_INDEX[d.id] = { kind:'nfc', def:d, group:null });

    const pricingState = { sel: {}, termMain:'yearly', termManage:'yearly' };
    const TERM_MULT = { monthly:1, quarterly:3, half:6 };
    function calcTerm(yearly, term) {
        if (!yearly) return 0;
        if (term === 'yearly') return yearly;
        const monthly = (curCode() === 'EUR') ? Math.round(yearly/10 * 100) / 100 : Math.round(yearly/10);
        return monthly * TERM_MULT[term];
    }
    function itemName(id) {
        const x = ITEM_INDEX[id]; if (!x) return id;
        if (x.kind === 'package') return t('n_pkg') + ' ' + x.def.tier;
        if (x.kind === 'manage') return t('n_manage') + ' ' + x.def.tier;
        if (x.kind === 'gsv') return 'GSV – ' + x.def.tier;
        if (x.kind === 'gsvair') return 'GSV AIR – ' + x.def.tier;
        return t(x.def.nk);
    }
    function itemUnitPrice(id) {
        const x = ITEM_INDEX[id];
        if (x.kind === 'package') return calcTerm(pv(x.def, 'yearly'), pricingState.termMain);
        if (x.kind === 'manage') return pricingState.termManage === 'yearly' ? pv(x.def, 'yearly') : pv(x.def, 'monthly') * TERM_MULT[pricingState.termManage];
        return pv(x.def, 'price');
    }
    function itemPayKey(id) {
        const x = ITEM_INDEX[id];
        if (x.kind === 'package') return 'pl_' + pricingState.termMain;
        if (x.kind === 'manage') return 'pl_' + pricingState.termManage;
        return 'pl_onetime';
    }
    function toggleItem(id, on) {
        const x = ITEM_INDEX[id]; if (!x) return;
        if (on) {
            if (x.group) Object.keys(pricingState.sel).forEach(sid => { if (ITEM_INDEX[sid] && ITEM_INDEX[sid].group === x.group && sid !== id) delete pricingState.sel[sid]; });
            pricingState.sel[id] = pricingState.sel[id] || { qty:1, disc:0 };
        } else delete pricingState.sel[id];
    }
    function computeTotals() {
        let recurring = 0, onetime = 0, origSum = 0, finalSum = 0, pkgSavings = 0;
        const lines = Object.keys(pricingState.sel).map(id => {
            const x = ITEM_INDEX[id], s = pricingState.sel[id];
            const qty = Math.max(1, parseInt(s.qty) || 1), disc = Math.min(100, Math.max(0, parseFloat(s.disc) || 0));
            const origUnit = itemUnitPrice(id);
            let effUnit = origUnit, tierApplied = false;
            if (x.kind === 'nfc' && pv(x.def, 'tier') && qty >= 5) { effUnit = pv(x.def, 'tier'); tierApplied = true; }
            const orig = origUnit * qty;
            const final = effUnit * qty * (1 - disc/100);
            const rec = (x.kind === 'package' || x.kind === 'manage');
            if (rec) recurring += final; else onetime += final;
            origSum += orig; finalSum += final;
            return { id, name: itemName(id), payKey: itemPayKey(id), qty, disc, origUnit, effUnit, orig, final, rec, tierApplied, individual: origUnit === 0 && (x.kind === 'package' || x.kind === 'manage' || pv(x.def, 'price') === 0) };
        });
        const mainPkg = Object.keys(pricingState.sel).find(id => ITEM_INDEX[id].kind === 'package');
        if (mainPkg) { const d = ITEM_INDEX[mainPkg].def; const sy = pv(d, 'savY'); if (sy) pkgSavings += pricingState.termMain === 'yearly' ? sy : pv(d, 'savB'); }
        const mng = Object.keys(pricingState.sel).find(id => ITEM_INDEX[id].kind === 'manage');
        if (mng && pricingState.termManage === 'yearly') { const d = ITEM_INDEX[mng].def; const sy = pv(d, 'savY'); if (sy) pkgSavings += sy; }
        return { lines, recurring, onetime, grand: recurring + onetime, discount: (origSum - finalSum) + pkgSavings };
    }

    const cellCls = 'px-3 py-2.5 flex items-center justify-center text-center text-sm border-b border-gray-100';
    const labelCls = 'px-3 py-2.5 flex items-center text-sm font-medium text-gray-700 bg-gray-50 border-b border-gray-100';
    function termSelectHtml(id, current) {

    function tierTable({tiers, rows, priceOf, savingsOf, termSelectId, termValue}) {

        tiers.forEach(d => h += `<div class="px-3 py-2.5 flex items-center justify-center text-center text-xs font-bold text-white uppercase tracking-wider rounded-t-lg" style="background:${TIER_COLORS[d.tier]}">${d.tier}</div>`);
        rows.forEach(r => {
            h += `<div class="${labelCls} ${r.sub ? 'pl-7 !font-normal text-gray-500' : ''}">${t(r.k)}</div>`;
            r.v.forEach(v => {

        h += `<div class="${labelCls} uppercase text-xs tracking-wider">${t('pPrice')}</div>`;
        tiers.forEach(d => { const p = priceOf(d); h += `<div class="${cellCls} font-bold text-gray-900">${p > 0 ? fmtK(p) : `<span class="text-xs text-gray-400 italic font-normal">${ind}</span>`}</div>`; });
        if (savingsOf) {

            tiers.forEach(d => { const s = savingsOf(d); h += `<div class="${cellCls} font-bold text-brand-600">${s > 0 ? fmtK(s) : '—'}</div>`; });

        if (termSelectId) {

        tiers.forEach(d => h += `<div class="px-3 py-3 flex items-center justify-center gap-2 bg-gray-50">
            <label class="inline-flex items-center gap-2 cursor-pointer text-sm font-semibold text-gray-700"><input type="checkbox" data-item="${d.id}" ${pricingState.sel[d.id] ? 'checked' : ''}> ${t('pSelect')}</label></div>`);
        h += '</div></div>';
        return h;
    }
    function serviceGrid(items) {
        return `<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">${items.map(d => `
            <label class="card-minimal !shadow-none px-4 py-3 flex items-center gap-3 cursor-pointer hover:border-brand-500 transition">

        $('#pricing-view').innerHTML = `

    function updateLineTotals() {
        const tt = computeTotals();
        tt.lines.forEach(l => {

    function ggStaticMapUrl() {

            const c = rankColor(p.rank).replace('#', '0x');
            (groups[c] = groups[c] || []).push(p.lat.toFixed(5) + ',' + p.lng.toFixed(5));
        });
        const markers = Object.entries(groups).map(([c, pts]) => 'markers=' + encodeURIComponent('size:mid|color:' + c + '|' + pts.join('|'))).join('&');
        return 'https://maps.googleapis.com/maps/api/staticmap?size=640x400&scale=2&maptype=roadmap&' + markers + '&key=' + EFFECTIVE_API_KEY;

    async function ggStaticMapData() {
        const url = ggStaticMapUrl();

            if (!r.ok) return null;

            return await new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = () => res(null); fr.readAsDataURL(b); });
        } catch (e) { return null; }
    }

            const cv = tmp.querySelector('canvas');

            <div style="margin-top:auto;text-align:center;padding-top:50px;"><img src="${LOGO_URL}" style="max-width:110px;height:auto;opacity:.85;" crossorigin="anonymous"></div>
            <div class="pdf-footer">${footer}</div></div>`;
    }
    async function renderPdfPage(pdf, html, isFirst, btn, label) {
        if (btn) btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i>${t('mGenerating')} ${label}`;
        const host = $('#pdf-render-host');
        host.innerHTML = html;
        const el = host.querySelector('.pdf-page');
        el.style.minHeight = '1123px';
        await new Promise(r => setTimeout(r, 60));
        await Promise.all([...el.querySelectorAll('img')].map(im => (im.complete && im.naturalWidth) ? Promise.resolve() : new Promise(res => { im.onload = im.onerror = res; setTimeout(res, 4000); })));
        await new Promise(r => setTimeout(r, 40));
        const sh = Math.max(el.scrollHeight, 1123);
        const target = sh <= 1140 ? 1123 : sh;
        el.style.height = target + 'px';
        const er = el.getBoundingClientRect();
        const links = [...el.querySelectorAll('[data-pdf-link]')].map(a => {
            const r = a.getBoundingClientRect();
            return { url: a.dataset.pdfLink, x: r.left - er.left, y: r.top - er.top, w: r.width, h: r.height };
        });
        const canvas = await html2canvas(el, { scale:2, useCORS:true, allowTaint:true, width: el.offsetWidth, height: target, windowHeight: target });
        el.style.height = '';
        const img = canvas.toDataURL('image/jpeg', 0.9);
        const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
        const imgH = canvas.height * pw / canvas.width;
        if (!isFirst) pdf.addPage();
        const basePage = pdf.internal.getNumberOfPages();
        pdf.addImage(img, 'JPEG', 0, 0, pw, imgH);
        let left = imgH - ph;
        while (left > ph * 0.05) {
            pdf.addPage();
            pdf.addImage(img, 'JPEG', 0, left - imgH, pw, imgH);
            left -= ph;
        }
        const lastPage = pdf.internal.getNumberOfPages();
        const mm = pw / el.offsetWidth;
        links.forEach(L => {
            if (!L.url) return;
            const yMM = L.y * mm, pageIdx = Math.floor(yMM / ph), target = basePage + pageIdx;
            if (target >= basePage && target <= lastPage) {
                try { pdf.setPage(target); pdf.link(L.x * mm, yMM - pageIdx * ph, L.w * mm, L.h * mm, { url: L.url }); } catch (e) {}
            }
        });
        pdf.setPage(lastPage);
        host.innerHTML = '';
    }
    async function generatePdf() {
        if (!window.jspdf || !window.html2canvas) { showToast(t('mPdfLibs')); return; }
        const btn = $('#m-generate-btn'), origHtml = btn.innerHTML;
        btn.disabled = true;
        const info = { company: $('#m-company').value || '—', ico: $('#m-ico').value || '—', person: $('#m-person').value || '—', email: $('#m-email').value || '—', phone: $('#m-phone').value || '—' };
        const want = (id) => { const el = document.getElementById(id); return el.checked && !el.disabled; };
        const tt = computeTotals();
        try {
            if ((want('pg-title') || want('pg-refs')) && !refsState.loaded && !refsState.error) { try { await loadRefs(false); } catch (e) {} }
            __ggMapData = (want('pg-audit') && geogridState.results) ? await ggStaticMapData() : null;
            const pdf = new window.jspdf.jsPDF({ orientation:'p', unit:'mm', format:'a4' });
            const pages = [];
            if (want('pg-title')) { pages.push((f) => pdfTitlePageHtml(info, f)); pages.push((f) => pdfAboutPageHtml(f)); }
            if (want('pg-audit') && currentPlaceDetails) pages.push(...pdfAuditPages(info.company));
            if (want('pg-solution') && currentPlaceDetails) pages.push(...pdfSolutionPages());
            if (want('pg-refs') && selectedRefs.length) pages.push(...pdfRefsPages());
            if (want('pg-quote') && tt.lines.length > 0) pages.push(...pdfQuotePages(info));
            if (want('pg-final')) pages.push((f) => pdfFinalPageHtml(info, f));
            if (pages.length === 0) { showToast(t('mSelectFirst')); btn.disabled = false; return; }
            for (let i = 0; i < pages.length; i++) {
                await renderPdfPage(pdf, pages[i](`${t('pdfPage')} ${i+1}/${pages.length} · viewcz.com`), i === 0, btn, `(${i+1}/${pages.length})`);
            }
            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i>${t('mDone')}`;
            pdf.save(`View - ${info.company !== '—' ? info.company : (currentPlaceDetails ? currentPlaceDetails.name : 'nabidka')}.pdf`);
            setTimeout(closePdfModal, 800);
        } catch (err) {
            console.error('PDF error:', err);
            showToast(t('mPdfErr'));
        } finally {
            setTimeout(() => { btn.innerHTML = origHtml; btn.disabled = false; applyStatic(); }, 1500);
        }
    }

    // ===================== REFERENCES =====================
    const CLIENTS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKN-JqGkH2b0dqI7-gHuDggTdi76W-7g-Q4eWlN2RMHjzMpYeG-PTO0r_GiAhm-ZnAxQeuN6nAmNt8/pub?gid=0&single=true&output=csv';
    const STATS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKN-JqGkH2b0dqI7-gHuDggTdi76W-7g-Q4eWlN2RMHjzMpYeG-PTO0r_GiAhm-ZnAxQeuN6nAmNt8/pub?gid=1290897837&single=true&output=csv';
    const refsState = { clients: [], stats: {}, loaded: false, loading: false, error: false, query: '', category: 'all' };
    // Publikovaná CSV URL listu „Prohlidky" (Soubor → Publikovat na web → list Prohlidky → CSV).
    const TOURS_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfmLoIewuv57p3wSzPQ93Ir-t38ij_yGpiYu4Ee1cQV0ZhscGGybXrG5MFLUnL-FePUKF8ewixtqHa/pub?gid=1365173251&single=true&output=csv';
    const toursState = { tours: [], loaded: false, loading: false, error: false, query: '' };
    const SVC_ICONS = [
        ['linktour','svc_tour','fa-street-view'], ['linkdrone','svc_drone','fa-helicopter'],
        ['hasoptimization','svc_opt','fa-arrow-trend-up'], ['hasmanagement','svc_manage','fa-user-gear'],
        ['linkproducts','svc_products','fa-cart-shopping'], ['linkbanners','svc_banners','fa-image'],
        ['linkapp','svc_app','fa-mobile-screen-button'], ['linknfc','svc_nfc','fa-wifi'],
    ];
    function parseCSVLine(line) {
        const out = []; let cur = '', q = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { if (q && line[i+1] === '"') { cur += '"'; i++; } else q = !q; }
            else if (ch === ',' && !q) { out.push(cur); cur = ''; }
            else cur += ch;
        }
        out.push(cur); return out;
    }
    async function fetchSheet(url, isStats) {
        const res = await fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now(), { signal: AbortSignal.timeout(15000) });
        if (!res.ok) throw new Error('Network');
        const lines = (await res.text()).trim().split(/\r?\n/);
        if (lines.length < 2) return isStats ? {} : [];
        const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g,''));
        const data = lines.slice(1).map(l => { const v = parseCSVLine(l); const o = {}; headers.forEach((h,i) => o[h] = (v[i]||'').trim()); return o; });
        if (isStats) return data.reduce((a,i) => { if (i.klic && i.hodnota) a[i.klic] = parseInt(i.hodnota,10)||0; return a; }, {});
        return data;
    }
    async function loadRefs(force) {
        if (refsState.loading || (refsState.loaded && !force)) return;
        refsState.loading = true; refsState.error = false;
        try {
            const [rawClients, stats] = await Promise.all([fetchSheet(CLIENTS_SHEET_URL,false), fetchSheet(STATS_SHEET_URL,true)]);
            refsState.clients = rawClients.map(c => { const id = parseInt(c.id,10); if (isNaN(id)) return null; return {...c, id, name: c.name||'N/A', category: c.category||'N/A', isNew:(c.isnew||'').toLowerCase()==='true'}; }).filter(Boolean);
            refsState.stats = stats; refsState.loaded = true;
        } catch (e) { console.error(e); refsState.error = true; }
        refsState.loading = false;
        if (currentView === 'references') renderReferences();
        else if (currentView === 'refstep') renderRefstep();
    }
    async function loadTours(force) {
        if (!TOURS_SHEET_URL || TOURS_SHEET_URL.indexOf('http') !== 0) { toursState.loaded = true; toursState.tours = []; return; }
        if (toursState.loading || (toursState.loaded && !force)) return;
        toursState.loading = true; toursState.error = false;
        try {
            const rows = await fetchSheet(TOURS_SHEET_URL, false);
            toursState.tours = rows.map(r => ({
                name: r.name || 'N/A', tour_url: r.tour_url || r.toururl || '', image: r.image || '',
                placeid: r.placeid || '', lat: r.lat || '', lng: r.lng || '', isNew: (r.isnew || '').toLowerCase() === 'true'
            })).filter(x => x.tour_url);
            toursState.loaded = true;
        } catch (e) { console.error(e); toursState.error = true; }
        toursState.loading = false;
        if (currentView === 'refstep') renderRefstep();
    }
    const fmtNum = (n) => String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    function refIcon(client, key, nameK, icon) {
        let v = client[key];
        const active = v && v.toLowerCase() !== 'false' && v.trim() !== '';
        if (active && v && !v.startsWith('http') && v.toLowerCase() !== 'true') v = 'https://' + v;
        const clickable = active && v && v.startsWith('http');
        const el = `<span class="relative inline-flex" title="${t(nameK)}"><i class="fa-solid ${icon} ${active ? 'text-gray-600' : 'text-gray-300'}"></i><span class="absolute -top-1 -right-1.5 w-2 h-2 rounded-full border border-white ${active ? 'bg-brand-500' : 'bg-red-400'}"></span></span>`;
        return clickable ? `<a href="${esc(v)}" target="_blank" class="hover:scale-110 transition-transform">${el}</a>` : el;
    }
    function refCard(c) {
        const icons = SVC_ICONS.map(([k,n,i]) => refIcon(c, k, n, i)).join('');
        return `<div class="card-minimal p-4 flex items-center gap-4 flex-wrap">
            <div class="flex-1 min-w-[180px]">
                <div class="flex items-center gap-2 flex-wrap"><h3 class="font-bold text-gray-900">${esc(c.name)}</h3>
                ${c.isNew ? `<span class="px-2 py-0.5 rounded bg-green-50 text-brand-600 text-[10px] font-bold uppercase tracking-wider border border-green-100">${t('refNewBadge')}</span>` : ''}</div>
                <p class="text-sm text-gray-500 mt-0.5">${esc(c.category)}</p>
            </div>
            <div class="flex items-center gap-3 text-base">${icons}</div>
        </div>`;
    }
    function refFiltered() {
        const q = refsState.query.toLowerCase();
        return refsState.clients.filter(c => c.name.toLowerCase().includes(q) && (refsState.category === 'all' || c.category === refsState.category));
    }
    let refDebounce;
    function renderReferences() {
        const v = $('#references-view');
        if (!refsState.loaded && !refsState.error) {
            v.innerHTML = spinnerHtml();
            loadRefs(false);
            return;
        }
        if (refsState.error) {
            v.innerHTML = `<div class="card-minimal p-12 text-center">
                <div class="w-14 h-14 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-cloud-arrow-down"></i></div>
                <h2 class="text-lg font-bold text-gray-900 mb-1">${t('refErr')}</h2>
                <p class="text-sm text-gray-500 mb-5">${t('refErrD')}</p>
                <button onclick="refsState.error=false; renderReferences();" class="bg-brand-500 text-white py-2 px-5 rounded-lg text-sm font-bold hover:bg-brand-600 transition">${t('refRefresh')}</button></div>`;
            return;
        }
        const cats = [...new Set(refsState.clients.map(c => c.category))].filter(c => c && c.toLowerCase() !== 'n/a' && c.toLowerCase() !== 'nenalezeno').sort();
        const statCard = (label, val, icon) => `<div class="card-minimal p-5 flex items-center gap-4">
            <div class="w-10 h-10 rounded-lg border border-green-200 bg-green-50 text-brand-600 flex items-center justify-center shrink-0"><i class="fa-solid ${icon}"></i></div>
            <div><p class="text-xs text-gray-500 uppercase tracking-wider">${label}</p><p class="text-xl font-bold text-gray-900 mt-0.5">${val}</p></div></div>`;
        v.innerHTML = `
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <p class="text-sm text-gray-500">${t('refSub')}</p>
                <button id="ref-refresh" class="border border-gray-300 bg-white text-gray-700 py-2 px-4 rounded-lg text-sm font-medium hover:bg-gray-50 transition shadow-sm inline-flex items-center gap-2 self-start"><i class="fa-solid fa-rotate"></i> ${t('refRefresh')}</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                ${statCard(t('refTotal'), refsState.clients.length, 'fa-users')}
                ${statCard(t('refNew'), refsState.clients.filter(c=>c.isNew).length, 'fa-wand-magic-sparkles')}
                ${statCard(t('refTours'), refsState.stats.prohlidky ? fmtNum(refsState.stats.prohlidky) : 'N/A', 'fa-eye')}
                ${statCard(t('refNews'), refsState.stats.novinky ? fmtNum(refsState.stats.novinky) : 'N/A', 'fa-newspaper')}
            </div>
            <div class="card-minimal p-4 flex flex-col sm:flex-row gap-3">
                <div class="flex-1 flex items-center gap-3 border border-gray-200 rounded-lg px-3 py-2 bg-white focus-within:border-brand-500">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
                    <input type="text" id="ref-search" value="${esc(refsState.query)}" placeholder="${t('refSearch')}" class="flex-1 bg-transparent outline-none text-sm min-w-0">
                </div>
                <select id="ref-cat" class="border border-gray-300 bg-white rounded-lg px-3 py-2 text-sm outline-none cursor-pointer hover:border-brand-500">
                    <option value="all">${t('refAll')}</option>${cats.map(c => `<option value="${esc(c)}" ${refsState.category===c?'selected':''}>${esc(c)}</option>`).join('')}
                </select>
            </div>
            <div id="ref-list" class="space-y-3"></div>`;
        renderRefList();
        $('#ref-search').addEventListener('input', (e) => { refsState.query = e.target.value; clearTimeout(refDebounce); refDebounce = setTimeout(renderRefList, 250); });
        $('#ref-cat').addEventListener('change', (e) => { refsState.category = e.target.value; renderRefList(); });
        $('#ref-refresh').addEventListener('click', async () => { refsState.loaded = false; renderReferences(); });
    }
    function renderRefList() {
        const list = $('#ref-list'); if (!list) return;
        const items = refFiltered();
        list.innerHTML = items.length ? items.map(refCard).join('') : `
            <div class="card-minimal p-12 text-center"><div class="w-14 h-14 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center text-2xl mx-auto mb-4"><i class="fa-solid fa-magnifying-glass-minus"></i></div>
            <h2 class="text-lg font-bold text-gray-900 mb-1">${t('refEmpty')}</h2><p class="text-sm text-gray-500">${t('refEmptyD')}</p></div>`;
    }

    // ===================== INIT =====================
    applyStatic();
    setNavState();
    highlightNav('nav-welcome');
    renderWelcome();
    $('#view-title').innerText = t('tWelcome');
    </script>
</body>
